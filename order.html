<body>

<h1>Place Your Candy Order</h1>

<h2>Order Form</h2>


<form>
    
    <form class="candy-form" action="submit_order.html" method="post">
    <label for="name">Name:</label>
    <input type="text" id="name" name="name" required>

    <label for="email">Email:</label>
    <input type="email" id="email" name="email" required>

    <label for="candy">Choose Candy:</label>
    <select id="candy" name="candy">
        <option>🍬 Gummy Bears</option>
        <option>🍫 Chocolate Bar</option>
        <option>🍭 Lollipops</option>
    </select>

    <label for="quantity">Quantity:</label>
    <input type="number" id="quantity" name="quantity" min="1" value="1">

    <input type="submit" value="🍭 Place Order">

</form>



</body>
</html>
